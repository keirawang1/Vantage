services:
  - type: web
    name: vantage-api
    runtime: python
    plan: free
    region: oregon
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Comma-separated browser origins allowed to call the API (include your frontend URL).
      - key: VANTAGE_CORS_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173"